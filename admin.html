<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>“乐享分”管理后台</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:PingFang SC,Microsoft YaHei,sans-serif}
    body{background:#f7f8fa;max-width:600px;margin:0 auto;padding:20px}
    .card{background:white;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
    .title{text-align:center;color:#ff5e57;margin-bottom:10px;font-size:20px}
    .tip{text-align:center;color:#666;font-size:13px;margin-bottom:20px}
    input{width:100%;padding:12px;border:1px solid #eee;border-radius:10px;margin-bottom:10px;font-size:15px}
    .row{display:flex;gap:8px}
    .row input{flex:1}
    button{width:100%;padding:14px;background:#ff5e57;color:white;border:none;border-radius:10px;font-size:16px;font-weight:bold;margin-top:6px}
    .del{background:#999}
    .batch-btn{background:#2d8cf0}
    h3{font-size:16px;color:#333;margin-bottom:10px}
    .user-item{padding:14px;background:#fdf3f2;border-radius:12px;margin-bottom:10px}
    .user-name{font-weight:bold;color:#ff5e57;margin-bottom:6px}
    .user-info{font-size:13px;color:#333;line-height:1.5}
    #login{position:fixed;top:0;left:0;width:100%;height:100%;background:white;display:flex;align-items:center;justify-content:center;z-index:999}
    textarea{width:100%;height:120px;padding:10px;border:1px solid #eee;border-radius:8px;margin-bottom:10px;font-family:monospace}
  </style>
</head>
<body>

<div id="login">
  <div class="card">
    <h2 class="title">“乐享分”管理后台登录</h2>
    <p class="tip">乐邻心选旗舰店 | 定海优品商行</p>
    <input type="password" id="pwd" placeholder="请输入管理员密码">
    <button onclick="login()">登录</button>
  </div>
</div>

<div id="main" style="display:none">
  <div class="card">
    <h2 class="title">“乐享分”管理后台</h2>
    <p class="tip">乐邻心选旗舰店 | 定海优品商行</p>
  </div>

  <div class="card">
    <h3>➕ 添加 / 修改会员分数</h3>
    <input id="key" placeholder="手机号/微信名/微信号（唯一标识）">
    <div class="row">
      <input id="buy" placeholder="消费分≤200">
      <input id="ref" placeholder="推荐分≤200">
    </div>
    <div class="row">
      <input id="act" placeholder="互动分≤100">
      <input id="sum" placeholder="乐善分≤100">
    </div>
    <button onclick="save()">保存 / 更新会员</button>
  </div>

  <div class="card">
    <h3>📥 批量导入会员（一行一个）</h3>
    <p style="font-size:12px;color:#666;margin-bottom:8px">格式：会员名,消费分,推荐分,互动分,综合分</p>
    <textarea id="batchData" placeholder="例如：
测试001,60,20,10,5
测试002,80,30,20,10"></textarea>
    <button class="batch-btn" onclick="batchImport()">一键批量导入</button>
  </div>

  <div class="card">
    <h3>🗑 删除会员</h3>
    <input id="delKey" placeholder="输入要删除的手机号/微信名">
    <button class="del" onclick="del()">删除会员</button>
  </div>

  <div class="card">
    <h3>📋 全部会员列表</h3>
    <div id="list"></div>
  </div>
</div>

<script>
const API = "https://api.f.0580520.cn";
const ADMIN_PWD = "hcdl133h";

function login() {
  if (document.getElementById("pwd").value === ADMIN_PWD) {
    document.getElementById("login").style.display = "none";
    document.getElementById("main").style.display = "block";
    loadList();
  } else {
    alert("密码错误");
  }
}

// 单个保存
async function save() {
  const key = document.getElementById("key").value.trim();
  const buy = parseInt(document.getElementById("buy").value) || 0;
  const ref = parseInt(document.getElementById("ref").value) || 0;
  const act = parseInt(document.getElementById("act").value) || 0;
  const sum = parseInt(document.getElementById("sum").value) || 0;

  if (!key) { alert("请输入会员标识"); return; }

  await fetch(API + "/set", {
    method: "POST",
    body: JSON.stringify({ key, data: { base:500, buy, ref, act, sum } })
  });
  alert("保存成功！");
  loadList();
}

// 批量导入
async function batchImport() {
  const text = document.getElementById("batchData").value.trim();
  if (!text) { alert("请输入批量数据"); return; }
  const lines = text.split(/\n/).filter(l => l.trim());
  let success = 0;
  for (let line of lines) {
    const parts = line.split(",").map(p => p.trim());
    if (parts.length < 5) continue;
    const key = parts[0];
    const buy = parseInt(parts[1]) || 0;
    const ref = parseInt(parts[2]) || 0;
    const act = parseInt(parts[3]) || 0;
    const sum = parseInt(parts[4]) || 0;

    await fetch(API + "/set", {
      method: "POST",
      body: JSON.stringify({ key, data: { base:500, buy, ref, act, sum } })
    });
    success++;
  }
  alert(`批量导入完成！成功导入 ${success} 条`);
  loadList();
}

// 删除
async function del() {
  const key = document.getElementById("delKey").value.trim();
  if (!key) return;
  await fetch(API + "/del/" + key);
  alert("已删除");
  loadList();
}

// 加载列表
async function loadList() {
  const r = await fetch(API + "/list");
  const d = await r.json();
  let html = "";
  for (let k in d.data) {
    const u = d.data[k];
    const total = u.base + u.buy + u.ref + u.act + u.sum;
    html += `
    <div class="user-item">
      <div class="user-name">${k}</div>
      <div class="user-info">
        基础:${u.base} 消费:${u.buy} 推荐:${u.ref} 互动:${u.act} 乐善:${u.sum}<br>
        总分:${total}
      </div>
    </div>`;
  }
  document.getElementById("list").innerHTML = html;
}
</script>
</body>
</html>
